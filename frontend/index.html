<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signaly</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Signaly">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">
          <svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M300 72L164 272h96l-48 168L448 236H344z" fill="#818cf8"/>
          </svg>
          Signaly
        </span>
        <button id="notif-btn" class="notif-btn" title="デスクトップ通知を許可する" aria-label="通知を許可">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
      <nav id="channel-list" aria-label="チャンネル一覧">
        <div class="loading-text">読み込み中…</div>
      </nav>
    </aside>

    <main id="main">
      <header id="feed-header">
        <h1 id="channel-title" class="channel-title">チャンネルを選択</h1>
        <span id="status" class="status status--disconnected" title="接続状態">●</span>
      </header>
      <div id="feed" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="empty-state" class="empty-state" hidden>通知はまだありません</div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
