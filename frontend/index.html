<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signaly</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Signaly">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">
          <svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M300 72L164 272h96l-48 168L448 236H344z" fill="#818cf8"/>
          </svg>
          Signaly
        </span>
        <button id="notif-btn" class="notif-btn" title="デスクトップ通知を許可する" aria-label="通知を許可">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
      <nav id="channel-list" aria-label="チャンネル一覧">
        <div class="loading-text">読み込み中…</div>
      </nav>
    </aside>

    <main id="main">
      <header id="feed-header">
        <h1 id="channel-title" class="channel-title">チャンネルを選択</h1>
        <span id="status" class="status status--disconnected" title="接続状態">●</span>
      </header>
      <div id="feed" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="empty-state" class="empty-state" hidden>通知はまだありません</div>
    </main>
  </div>

  <div id="login-overlay">
    <div class="login-box">
      <svg width="36" height="36" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M300 72L164 272h96l-48 168L448 236H344z" fill="#818cf8"/>
      </svg>
      <h1 class="login-title">Signaly</h1>
      <p class="login-desc">ログインして通知を受け取る</p>
      <a href="auth/login" class="login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Googleでログイン
      </a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
