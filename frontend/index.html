<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signaly</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Signaly">
</head>
<body>
  <div id="app">
    <div id="sidebar-backdrop" class="sidebar-backdrop" hidden aria-hidden="true"></div>
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="logo">
          <svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M300 72L164 272h96l-48 168L448 236H344z" fill="#818cf8"/>
          </svg>
          Signaly
        </span>
        <button id="notif-btn" class="notif-btn" title="デスクトップ通知を許可する" aria-label="通知を許可">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
      </div>
      <div class="channel-section-header">
        <span class="channel-section-label">チャンネル</span>
        <button id="add-channel-btn" class="add-channel-btn" type="button" title="チャンネルを作成" aria-label="チャンネルを作成" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <nav id="channel-list" aria-label="チャンネル一覧">
        <div class="loading-text">読み込み中…</div>
      </nav>
      <footer class="sidebar-footer">
        <button id="version-btn" class="version-btn" title="更新履歴を見る">v…</button>
      </footer>
    </aside>

    <main id="main">
      <header id="feed-header">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="メニューを開く" aria-expanded="false" aria-controls="sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 id="channel-title" class="channel-title">チャンネルを選択</h1>
        <span id="status" class="status status--disconnected" title="接続状態">●</span>
      </header>
      <div id="feed" role="log" aria-live="polite" aria-relevant="additions"></div>
      <div id="empty-state" class="empty-state" hidden>通知はまだありません</div>
    </main>
  </div>

  <div id="create-channel-dialog" class="changelog-dialog" role="dialog" aria-modal="true" aria-label="チャンネルを作成">
    <div class="changelog-panel create-channel-panel">
      <div class="changelog-header">
        <h2 class="changelog-title" id="create-channel-title">チャンネルを作成</h2>
        <button id="create-channel-close" class="changelog-close" aria-label="閉じる">✕</button>
      </div>
      <form id="create-channel-form" class="create-channel-body">
        <label class="create-channel-label" for="create-channel-name">チャンネル名</label>
        <input id="create-channel-name" class="create-channel-input" type="text" maxlength="100" placeholder="general" required autocomplete="off">
        <p id="create-channel-error" class="create-channel-error" hidden></p>
        <button type="submit" class="create-channel-submit">作成</button>
      </form>
      <div id="create-channel-success" class="create-channel-body" hidden>
        <p class="create-channel-success-text">チャンネル <strong id="create-channel-success-name"></strong> を作成しました。</p>
        <label class="create-channel-label" for="create-channel-webhook">Webhook URL</label>
        <div class="create-channel-webhook-row">
          <input id="create-channel-webhook" class="create-channel-input create-channel-webhook-input" type="text" readonly>
          <button id="create-channel-copy" type="button" class="create-channel-copy" title="コピー">コピー</button>
        </div>
        <p class="create-channel-hint">この URL に POST すると通知が届きます。</p>
        <button id="create-channel-done" type="button" class="create-channel-submit">完了</button>
      </div>
    </div>
  </div>

  <div id="channel-settings-dialog" class="changelog-dialog" role="dialog" aria-modal="true" aria-label="チャンネル設定">
    <div class="changelog-panel create-channel-panel">
      <div class="changelog-header">
        <h2 class="changelog-title" id="channel-settings-title">チャンネル設定</h2>
        <button id="channel-settings-close" class="changelog-close" aria-label="閉じる">✕</button>
      </div>
      <div class="create-channel-body">
        <p class="create-channel-success-text">チャンネル <strong id="channel-settings-name"></strong> の Webhook URL です。</p>
        <label class="create-channel-label" for="channel-settings-webhook">Webhook URL</label>
        <div class="create-channel-webhook-row">
          <input id="channel-settings-webhook" class="create-channel-input create-channel-webhook-input" type="text" readonly>
          <button id="channel-settings-copy" type="button" class="create-channel-copy" title="コピー">コピー</button>
        </div>
        <p class="create-channel-hint">この URL に POST すると通知が届きます。</p>
      </div>
    </div>
  </div>

  <div id="changelog-dialog" class="changelog-dialog" role="dialog" aria-modal="true" aria-label="更新履歴">
    <div class="changelog-panel">
      <div class="changelog-header">
        <h2 class="changelog-title">更新履歴</h2>
        <button id="changelog-close" class="changelog-close" aria-label="閉じる">✕</button>
      </div>
      <div id="changelog-list" class="changelog-list"></div>
    </div>
  </div>

  <div id="login-overlay">
    <div class="login-box">
      <svg width="36" height="36" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M300 72L164 272h96l-48 168L448 236H344z" fill="#818cf8"/>
      </svg>
      <h1 class="login-title">Signaly</h1>
      <p class="login-desc">ログインして通知を受け取る</p>
      <a id="login-link" href="auth/login" class="login-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Googleでログイン
      </a>
    </div>
  </div>

  <script src="changelog.js"></script>
  <script src="app.js"></script>
</body>
</html>
