# Signaly — Apache リバースプロキシ設定
# 既存の VirtualHost 内に追記する

    # SSE を通すためバッファリングを無効化
    ProxyPass        /signaly/ http://127.0.0.1:8001/ flushpackets=on
    ProxyPassReverse /signaly/ http://127.0.0.1:8001/

    # SSE 用タイムアウト調整（デフォルト 300 秒から延長）
    <Location /signaly/api/stream/>
        ProxyPass        http://127.0.0.1:8001/api/stream/ flushpackets=on timeout=3600
        ProxyPassReverse http://127.0.0.1:8001/api/stream/
    </Location>
