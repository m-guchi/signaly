name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: SSH キーをセットアップ
        uses: shimataro/ssh-key-action@v2
        with:
          key:           ${{ env.SSH_PRIVATE_KEY }}
          known_hosts:   placeholder
          if_key_exists: replace

      - name: known_hosts を追加
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: VPS にデプロイ
        env:
          APP_DIR:     ${{ env.APP_DIR }}
          DB_NAME:     ${{ env.DB_NAME }}
          DB_USER:     ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST:     ${{ env.DB_HOST }}
          DB_PORT:     ${{ env.DB_PORT }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT}" \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='backend/channels.json' \
            ./ "${USERNAME}@${HOST}:${APP_DIR}/"

          b64() { printf '%s' "$1" | base64 -w 0; }

          ssh -p "${SSH_PORT}" "${USERNAME}@${HOST}" << EOF
            set -e
            cd "${APP_DIR}"

            # .env に DB 接続情報を書き込む（既存行を上書き）
            sync_env_var() {
              key="\$1"
              value="\$(printf '%s' "\$2" | base64 -d)"
              touch .env
              if grep -q "^\${key}=" .env; then
                grep -v "^\${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "\$key" "\$value" >> .env
            }

            sync_env_var DB_NAME     '$(b64 "$DB_NAME")'
            sync_env_var DB_USER     '$(b64 "$DB_USER")'
            sync_env_var DB_PASSWORD '$(b64 "$DB_PASSWORD")'
            sync_env_var DB_HOST     '$(b64 "$DB_HOST")'
            sync_env_var DB_PORT     '$(b64 "$DB_PORT")'

            .venv/bin/pip install --quiet -r backend/requirements.txt

            sed "s|{{APP_DIR}}|${APP_DIR}|g" \
              deploy/signaly.service.template | sudo tee /etc/systemd/system/signaly.service > /dev/null
            sudo systemctl daemon-reload
            sudo systemctl restart signaly
          EOF

      - name: Discord に通知
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_APP:    Signaly
          NOTIFY_KIND:   デプロイ
          NOTIFY_STATUS: ${{ job.status }}
          NOTIFY_JOB:    deploy
        run: bash .github/scripts/discord-notify.sh
