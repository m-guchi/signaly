name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-signaly-production
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA=$(git rev-parse HEAD)

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$TAG")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag ${TAG} already points to HEAD"
              exit 0
            fi
            echo "::error::Tag ${TAG} already exists on ${TAG_SHA}, but HEAD is ${HEAD_SHA}. Bump version.json before merging."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  deploy:
    runs-on: ubuntu-latest
    needs: tag

    steps:
      - uses: actions/checkout@v4

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: SSH キーをセットアップ
        uses: shimataro/ssh-key-action@v2
        with:
          key:           ${{ env.SSH_PRIVATE_KEY }}
          known_hosts:   placeholder
          if_key_exists: replace

      - name: known_hosts を追加
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: VPS にデプロイ
        env:
          TARGET_DIR:  ${{ env.TARGET_DIR }}
          DB_NAME:     ${{ env.DB_NAME }}
          DB_USER:     ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST:     ${{ env.DB_HOST }}
          DB_PORT:     ${{ env.DB_PORT }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT}" \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='backend/channels.json' \
            ./ "${USERNAME}@${HOST}:${TARGET_DIR}/"

          b64() { printf '%s' "$1" | base64 -w 0; }

          ssh -p "${SSH_PORT}" "${USERNAME}@${HOST}" << EOF
            set -e
            cd "${TARGET_DIR}"

            # .env に DB 接続情報を書き込む（既存行を上書き）
            sync_env_var() {
              key="\$1"
              value="\$(printf '%s' "\$2" | base64 -d)"
              touch .env
              if grep -q "^\${key}=" .env; then
                grep -v "^\${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "\$key" "\$value" >> .env
            }

            sync_env_var DB_NAME     '$(b64 "$DB_NAME")'
            sync_env_var DB_USER     '$(b64 "$DB_USER")'
            sync_env_var DB_PASSWORD '$(b64 "$DB_PASSWORD")'
            sync_env_var DB_HOST     '$(b64 "$DB_HOST")'
            sync_env_var DB_PORT     '$(b64 "$DB_PORT")'

            bash deploy/ensure_venv.sh "${TARGET_DIR}"

            sudo "${TARGET_DIR}/deploy/restart-service.sh" "${TARGET_DIR}"
          EOF

  release:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          skip_if_release_exists: true

  notify:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Determine workflow status
        id: status
        run: |
          tag="${{ needs.tag.result }}"
          deploy="${{ needs.deploy.result }}"
          if [ "$tag" = "success" ] && [ "$deploy" = "success" ]; then
            result=success
          elif [ "$tag" = "cancelled" ] || [ "$deploy" = "cancelled" ]; then
            result=cancelled
          else
            result=failure
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Discord に通知
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_APP:    Signaly
          NOTIFY_KIND:   デプロイ
          NOTIFY_STATUS: ${{ steps.status.outputs.result }}
          NOTIFY_JOB:    deploy
        run: bash .github/scripts/discord-notify.sh

  notify-release:
    runs-on: ubuntu-latest
    needs: [deploy, release]
    if: always() && needs.release.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Discord に通知
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_APP:    Signaly
          NOTIFY_KIND:   リリース
          NOTIFY_STATUS: ${{ needs.release.result }}
          NOTIFY_JOB:    release
        run: bash .github/scripts/discord-notify.sh
