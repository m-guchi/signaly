name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-signaly-production
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('version.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA=$(git rev-parse HEAD)

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$TAG")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag ${TAG} already points to HEAD"
              exit 0
            fi
            echo "::error::Tag ${TAG} already exists on ${TAG_SHA}, but HEAD is ${HEAD_SHA}. Bump version.json before merging."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  deploy:
    runs-on: ubuntu-latest
    needs: tag

    steps:
      - uses: actions/checkout@v4

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: SSH キーをセットアップ
        uses: shimataro/ssh-key-action@v2
        with:
          key:           ${{ env.SSH_PRIVATE_KEY }}
          known_hosts:   placeholder
          if_key_exists: replace

      - name: known_hosts を追加
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: VPS にデプロイ
        env:
          TARGET_DIR:           ${{ env.TARGET_DIR }}
          DB_NAME:              ${{ env.DB_NAME }}
          DB_USER:              ${{ env.DB_USER }}
          DB_PASSWORD:          ${{ env.DB_PASSWORD }}
          DB_HOST:              ${{ env.DB_HOST }}
          DB_PORT:              ${{ env.DB_PORT }}
          GOOGLE_CLIENT_ID:     ${{ env.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ env.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI:  ${{ env.GOOGLE_REDIRECT_URI }}
          APP_URL:              ${{ env.APP_URL }}
          ALLOWED_EMAILS:       ${{ env.ALLOWED_EMAILS }}
          SECRET_KEY:           ${{ env.SECRET_KEY }}
          LOGIN_WEBHOOK_URL:    ${{ env.LOGIN_WEBHOOK_URL }}
          VAPID_PUBLIC_KEY:     ${{ env.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:    ${{ env.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:        ${{ env.VAPID_SUBJECT }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${SSH_PORT}" \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='backend/channels.json' \
            ./ "${USERNAME}@${HOST}:${TARGET_DIR}/"

          b64() { printf '%s' "$1" | base64 -w 0; }
          GOOGLE_CLIENT_ID_B64=$(b64 "$GOOGLE_CLIENT_ID")
          GOOGLE_CLIENT_SECRET_B64=$(b64 "$GOOGLE_CLIENT_SECRET")
          GOOGLE_REDIRECT_URI_B64=$(b64 "$GOOGLE_REDIRECT_URI")
          APP_URL_B64=$(b64 "$APP_URL")
          ALLOWED_EMAILS_B64=$(b64 "$ALLOWED_EMAILS")
          SECRET_KEY_B64=$(b64 "$SECRET_KEY")
          LOGIN_WEBHOOK_URL_B64=$(b64 "$LOGIN_WEBHOOK_URL")
          VAPID_PUBLIC_KEY_B64=$(b64 "$VAPID_PUBLIC_KEY")
          VAPID_PRIVATE_KEY_B64=$(b64 "$VAPID_PRIVATE_KEY")
          VAPID_SUBJECT_B64=$(b64 "$VAPID_SUBJECT")
          DB_NAME_B64=$(b64 "$DB_NAME")
          DB_USER_B64=$(b64 "$DB_USER")
          DB_PASSWORD_B64=$(b64 "$DB_PASSWORD")
          DB_HOST_B64=$(b64 "$DB_HOST")
          DB_PORT_B64=$(b64 "$DB_PORT")

          ssh -p "${SSH_PORT}" "${USERNAME}@${HOST}" << EOF
            set -e
            cd "${TARGET_DIR}"

            sync_env_var() {
              key="\$1"
              value="\$(printf '%s' "\$2" | base64 -d)"
              touch .env
              if grep -q "^\${key}=" .env; then
                grep -v "^\${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "\$key" "\$value" >> .env
            }

            sync_env_var GOOGLE_CLIENT_ID     '${GOOGLE_CLIENT_ID_B64}'
            sync_env_var GOOGLE_CLIENT_SECRET '${GOOGLE_CLIENT_SECRET_B64}'
            sync_env_var GOOGLE_REDIRECT_URI  '${GOOGLE_REDIRECT_URI_B64}'
            sync_env_var APP_URL              '${APP_URL_B64}'
            sync_env_var ALLOWED_EMAILS       '${ALLOWED_EMAILS_B64}'
            sync_env_var SECRET_KEY           '${SECRET_KEY_B64}'
            sync_env_var LOGIN_WEBHOOK_URL    '${LOGIN_WEBHOOK_URL_B64}'
            sync_env_var VAPID_PUBLIC_KEY     '${VAPID_PUBLIC_KEY_B64}'
            sync_env_var VAPID_PRIVATE_KEY    '${VAPID_PRIVATE_KEY_B64}'
            sync_env_var VAPID_SUBJECT        '${VAPID_SUBJECT_B64}'
            sync_env_var DB_NAME              '${DB_NAME_B64}'
            sync_env_var DB_USER              '${DB_USER_B64}'
            sync_env_var DB_PASSWORD          '${DB_PASSWORD_B64}'
            sync_env_var DB_HOST              '${DB_HOST_B64}'
            sync_env_var DB_PORT              '${DB_PORT_B64}'

            bash deploy/ensure_venv.sh "${TARGET_DIR}"

            bash deploy/restart-service.sh "${TARGET_DIR}"
          EOF

  release:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          skip_if_release_exists: true

  notify:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Determine workflow status
        id: status
        run: |
          tag="${{ needs.tag.result }}"
          deploy="${{ needs.deploy.result }}"
          if [ "$tag" = "success" ] && [ "$deploy" = "success" ]; then
            result=success
          elif [ "$tag" = "cancelled" ] || [ "$deploy" = "cancelled" ]; then
            result=cancelled
          else
            result=failure
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Signaly に通知
        env:
          SIGNALY_WEBHOOK_URL: ${{ env.SIGNALY_WEBHOOK_URL }}
          NOTIFY_APP:    Signaly
          NOTIFY_KIND:   デプロイ
          NOTIFY_STATUS: ${{ steps.status.outputs.result }}
          NOTIFY_JOB:    deploy
        run: bash .github/scripts/signaly-notify.sh

  notify-release:
    runs-on: ubuntu-latest
    needs: [deploy, release]
    if: always() && needs.release.result != 'skipped'

    steps:
      - uses: actions/checkout@v4

      - name: 1Password からシークレットを読み込む
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: .github/deploy.env.tpl

      - name: Signaly に通知
        env:
          SIGNALY_WEBHOOK_URL: ${{ env.SIGNALY_WEBHOOK_URL }}
          NOTIFY_APP:      Signaly
          NOTIFY_KIND:     リリース
          NOTIFY_STATUS:   ${{ needs.release.result }}
          NOTIFY_JOB:      release
          NOTIFY_VERSION:  ${{ needs.tag.outputs.tag }}
        run: bash .github/scripts/signaly-notify.sh
